<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MobiTracker – Mobile Service Management Dashboard</title>
  <meta name="description" content="Professional mobile repair shop management software. Track service orders, customers, repairs, and payments all in one place." />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .dashboard-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }
    .recent-activity { margin-top: 4px; }
    .activity-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .activity-item:last-child { border-bottom: none; }
    .activity-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .activity-text { flex: 1; }
    .activity-title { font-size: 13px; font-weight: 600; }
    .activity-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .activity-time { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

    /* Quick service list */
    .quick-list { display: flex; flex-direction: column; gap: 0; }
    .quick-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
      transition: var(--transition);
    }
    .quick-item:last-child { border-bottom: none; }
    .quick-item:hover { padding-left: 8px; }
    .quick-device-icon {
      width: 40px; height: 40px;
      border-radius: var(--radius-md);
      background: var(--bg-input);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .quick-info { flex: 1; min-width: 0; }
    .quick-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .quick-id { font-size: 11px; color: var(--text-muted); font-family: 'Space Grotesk', sans-serif; }
    .quick-right { text-align: right; flex-shrink: 0; }
    .quick-amount { font-size: 13px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; color: var(--accent-primary); }

    /* Revenue chart placeholder */
    .revenue-chart {
      height: 100px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 0 0;
    }
    .chart-bar {
      flex: 1;
      border-radius: 4px 4px 0 0;
      background: rgba(108, 99, 255, 0.3);
      transition: var(--transition);
      cursor: pointer;
      position: relative;
    }
    .chart-bar:hover { background: var(--accent-primary); }
    .chart-bar .bar-label {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .chart-wrapper { padding-bottom: 24px; }

    @media (max-width: 1024px) {
      .dashboard-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app-wrapper">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">📱</div>
      <div>
        <div class="logo-text">MobiTracker</div>
        <div class="logo-sub">Service Management</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="index.html" class="nav-item" id="nav-dashboard">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a href="new-service.html" class="nav-item" id="nav-new">
        <span class="nav-icon">➕</span>
        <span class="nav-label">New Service</span>
      </a>
      <a href="records.html" class="nav-item" id="nav-records">
        <span class="nav-icon">📋</span>
        <span class="nav-label">Service Records</span>
      </a>

      <div class="nav-section-label">Reports</div>
      <a href="records.html?filter=pending" class="nav-item">
        <span class="nav-icon">⏳</span>
        <span class="nav-label">Pending</span>
      </a>
      <a href="records.html?filter=in_progress" class="nav-item">
        <span class="nav-icon">🔧</span>
        <span class="nav-label">In Progress</span>
      </a>
      <a href="records.html?filter=completed" class="nav-item">
        <span class="nav-icon">✅</span>
        <span class="nav-label">Completed</span>
      </a>
      <a href="records.html?payment=unpaid" class="nav-item">
        <span class="nav-icon">💳</span>
        <span class="nav-label">Unpaid Bills</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar">A</div>
        <div>
          <div class="user-name">Admin</div>
          <div class="user-role">Shop Manager</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-title">
        Dashboard
        <span id="topbar-date"></span>
      </div>
      <div class="topbar-actions">
        <a href="new-service.html" class="btn btn-primary" id="new-service-btn">
          <span>➕</span> New Service
        </a>
      </div>
    </header>

    <div class="page-content fade-in">

      <!-- Stats -->
      <div class="stats-grid" id="stats-grid">
        <!-- Filled by JS -->
      </div>

      <!-- Main Grid -->
      <div class="dashboard-grid">

        <!-- Recent Services -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">
              <div class="title-icon" style="background:rgba(108,99,255,0.15)">📋</div>
              Recent Services
            </div>
            <a href="records.html" class="btn btn-secondary btn-sm">View All →</a>
          </div>
          <div class="quick-list" id="recent-list">
            <!-- Filled by JS -->
          </div>
        </div>

        <!-- Right Column -->
        <div style="display:flex;flex-direction:column;gap:20px;">

          <!-- Revenue Overview -->
          <div class="card">
            <div class="card-header">
              <div class="card-title">
                <div class="title-icon" style="background:rgba(16,185,129,0.15)">💰</div>
                Revenue (This Month)
              </div>
            </div>
            <div style="font-size:28px;font-weight:800;font-family:'Space Grotesk',sans-serif;color:var(--accent-success);" id="monthly-revenue">₹0</div>
            <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;" id="revenue-sub">This month</div>
            <div class="chart-wrapper">
              <div class="revenue-chart" id="revenue-chart"></div>
            </div>
          </div>

          <!-- Status Breakdown -->
          <div class="card">
            <div class="card-header">
              <div class="card-title">
                <div class="title-icon" style="background:rgba(6,182,212,0.15)">📊</div>
                Status Breakdown
              </div>
            </div>
            <div id="status-breakdown" style="display:flex;flex-direction:column;gap:12px;">
              <!-- Filled by JS -->
            </div>
          </div>

        </div>
      </div>

    </div>
  </main>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
