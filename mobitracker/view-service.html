<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>View Service – MobiTracker</title>
  <meta name="description" content="View complete repair service details, customer information, device info, and payment status."/>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    .view-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 20px;
      align-items: start;
    }

    .info-block {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 16px;
    }

    .info-block-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .info-block-icon {
      width: 34px; height: 34px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
    }

    .info-block-title { font-size: 14px; font-weight: 700; }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .info-item {}
    .info-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 4px; }
    .info-value { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .info-value.accent { color: var(--accent-primary); font-family: 'Space Grotesk', sans-serif; font-size: 16px; }
    .info-value.muted { color: var(--text-secondary); font-weight: 400; }

    /* Problem chips display */
    .problem-chips-display {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .problem-chip-display {
      padding: 5px 12px;
      border-radius: var(--radius-full);
      background: rgba(108,99,255,0.12);
      border: 1px solid rgba(108,99,255,0.25);
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-primary);
    }

    /* Spare parts display */
    .spare-chips-display {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .spare-chip-display {
      padding: 5px 12px;
      border-radius: var(--radius-full);
      background: rgba(6,182,212,0.1);
      border: 1px solid rgba(6,182,212,0.25);
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-tertiary);
    }

    /* Condition badges */
    .condition-badges { display: flex; gap: 10px; flex-wrap: wrap; }
    .cond-badge {
      padding: 6px 14px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 700;
    }
    .cond-broken { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; }
    .cond-ok { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25); color: #10b981; }
    .cond-on { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25); color: #10b981; }
    .cond-off { background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3); color: #f59e0b; }

    /* Right panel */
    .right-panel {
      position: sticky;
      top: calc(var(--topbar-height) + 20px);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Device card */
    .device-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 24px;
      text-align: center;
    }

    .device-big-img {
      width: 130px; height: 200px;
      border-radius: 18px;
      border: 2px solid var(--border-accent);
      box-shadow: var(--shadow-glow);
      background: var(--bg-secondary);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      overflow: hidden;
    }

    /* Payment summary card */
    .payment-card {
      background: linear-gradient(135deg, rgba(16,185,129,0.07), rgba(6,182,212,0.05));
      border: 1px solid rgba(16,185,129,0.2);
      border-radius: var(--radius-lg);
      padding: 20px;
    }

    .pay-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      font-size: 13px;
    }
    .pay-row .pay-label { color: var(--text-secondary); }
    .pay-row .pay-val { font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
    .pay-row.total {
      border-top: 1px solid rgba(255,255,255,0.08);
      margin-top: 6px; padding-top: 12px;
      font-size: 16px;
    }
    .pay-row.total .pay-label { font-weight: 700; color: var(--text-primary); }
    .pay-row.total .pay-val { color: var(--accent-success); font-size: 20px; }

    /* Timeline */
    .timeline { display: flex; flex-direction: column; gap: 0; }
    .timeline-item { display: flex; gap: 12px; }
    .timeline-line-wrap { display: flex; flex-direction: column; align-items: center; }
    .timeline-dot {
      width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; margin-top: 3px;
    }
    .timeline-connector { width: 2px; flex: 1; background: var(--border-subtle); margin: 4px 0; min-height: 20px; }
    .timeline-content { padding-bottom: 16px; }
    .timeline-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
    .timeline-val { font-size: 13px; font-weight: 600; margin-top: 2px; }
    .timeline-val.done { color: var(--accent-success); }
    .timeline-val.pending { color: var(--accent-warning); }
    .timeline-val.empty { color: var(--text-muted); font-style: italic; }

    /* SMS History */
    .sms-item {
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .sms-meta { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .sms-to { font-weight: 700; color: var(--accent-tertiary); }
    .sms-time { color: var(--text-muted); }
    .sms-text { color: var(--text-secondary); line-height: 1.5; }

    /* Status Update inline */
    .status-update-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .status-update-btn {
      padding: 7px 14px;
      border-radius: var(--radius-full);
      border: 1px solid var(--border-subtle);
      background: var(--bg-input);
      font-size: 12px; font-weight: 600;
      cursor: pointer; transition: var(--transition);
      color: var(--text-secondary);
    }
    .status-update-btn:hover { border-color: var(--accent-primary); color: var(--accent-primary); }
    .status-update-btn.current-pending { background: rgba(245,158,11,0.15); border-color: #f59e0b; color: #f59e0b; }
    .status-update-btn.current-progress { background: rgba(59,130,246,0.15); border-color: #3b82f6; color: #3b82f6; }
    .status-update-btn.current-completed { background: rgba(16,185,129,0.15); border-color: #10b981; color: #10b981; }

    @media (max-width: 1024px) {
      .view-layout { grid-template-columns: 1fr; }
      .right-panel { position: static; }
    }
  </style>
</head>
<body>
<div class="app-wrapper">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">📱</div>
      <div>
        <div class="logo-text">MobiTracker</div>
        <div class="logo-sub">Service Management</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label">Dashboard</span></a>
      <a href="new-service.html" class="nav-item"><span class="nav-icon">➕</span><span class="nav-label">New Service</span></a>
      <a href="records.html" class="nav-item"><span class="nav-icon">📋</span><span class="nav-label">Service Records</span></a>
      <div class="nav-section-label">Reports</div>
      <a href="records.html?filter=pending" class="nav-item"><span class="nav-icon">⏳</span><span class="nav-label">Pending</span></a>
      <a href="records.html?filter=in_progress" class="nav-item"><span class="nav-icon">🔧</span><span class="nav-label">In Progress</span></a>
      <a href="records.html?filter=completed" class="nav-item"><span class="nav-icon">✅</span><span class="nav-label">Completed</span></a>
      <a href="records.html?payment=unpaid" class="nav-item"><span class="nav-icon">💳</span><span class="nav-label">Unpaid Bills</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar">A</div>
        <div><div class="user-name">Admin</div><div class="user-role">Shop Manager</div></div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-title" id="topbar-title">Service Details</div>
      <div class="topbar-actions" id="topbar-actions">
        <!-- Filled by JS -->
      </div>
    </header>

    <div class="page-content fade-in" id="page-content">
      <!-- Filled by JS -->
    </div>
  </main>
</div>

<!-- SMS Modal -->
<div class="modal-overlay" id="sms-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">📱 Send WhatsApp to Customer</div>
      <button class="modal-close" onclick="closeSMSModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group mb-16">
        <label class="form-label">Recipient</label>
        <input type="text" class="form-control" id="sms-to" readonly/>
      </div>
      <div class="form-group mb-16">
        <label class="form-label">Message</label>
        <textarea class="form-control" id="sms-message" rows="4"></textarea>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary" onclick="confirmSendSMS()">📤 Send WhatsApp</button>
        <button class="btn btn-secondary" onclick="closeSMSModal()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script src="js/view-service.js"></script>
</body>
</html>
